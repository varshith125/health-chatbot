version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: health-chatbot-db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - health-chatbot-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health-chatbot-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/health-chatbot
      JWT_SECRET: your_jwt_secret_key_here
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - health-chatbot-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health-chatbot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - health-chatbot-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  health-chatbot-network:
    driver: bridge
